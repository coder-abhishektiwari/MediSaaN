# 1. Memory Optimization (Build fast karne ke liye)
# Windows par Gradle ko zyada RAM chahiye hoti hai
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# 2. Parallel Execution (Multi-core processor ka pura use karega)
org.gradle.parallel=true
org.gradle.daemon=true
org.gradle.configureondemand=true
org.gradle.caching=true

# 3. AndroidX Support
android.useAndroidX=true
android.enableJetifier=true

# 4. Architecture Settings (The "Stabilizer")
newArchEnabled=true
hermesEnabled=true

# 5. Build Speed Tweaks
# Sirf wo architecture build karega jo phone ke liye chahiye (development time bachata hai)
reactNativeArchitectures=armeabi-v7a,arm64-v8a

# 6. UI Settings
edgeToEdgeEnabled=false

# 7. Kotlin Optimization
kotlin.incremental=true
kotlin.code.style=official